<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pengelola - DPRD Jawa Timur</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Khusus Admin -->
    <link rel="stylesheet" href="admin-style.css">
</head>

<body class="bg-gray">

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="https://static.atnmedia.id/2025/04/23/dprd-jatim-FfhO8.png" alt="Logo DPRD Jatim"
                    class="login-logo">
                <h2>Portal Admin</h2>
                <p>Silakan masuk untuk mengelola aspirasi masyarakat</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user text-muted"></i> Nama Pengguna / NIP</label>
                    <input type="text" id="username" class="form-control" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock text-muted"></i> Kata Sandi</label>
                    <div class="password-toggle">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                        <i class="fas fa-eye-slash toggle-icon" id="togglePassword"></i>
                    </div>
                </div>

                <div id="loginError"
                    style="color: #dc3545; font-size: 0.85rem; display: none; margin-bottom: 15px; text-align: center;">
                    Username atau password salah!
                </div>

                <div class="form-options">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        <span class="policy-text">Ingat Saya</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-pwd">Lupa Sandi?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Masuk <i class="fas fa-sign-in-alt ml-2"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>&copy; 2026 Admin Panel DPRD Jawa Timur.<br>Semua Hak Cipta Dilindungi.</p>
                <div class="mt-3">
                    <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Halaman
                        Publik</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value.trim();
            
            console.log("Mencoba login via API:", userVal);

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: userVal, password: passVal })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    console.log("Login Berhasil:", data.user.username);
                    loginError.style.display = 'none';
                    sessionStorage.setItem('currentUser', JSON.stringify(data.user));
                    
                    // Log Aktivitas ke Backend
                    fetch('/api/activity', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user: data.user.name,
                            action: 'Login ke Sistem',
                            time: new Date().toLocaleString('id-ID'),
                            icon: 'fa-sign-in-alt',
                            color: 'text-success'
                        })
                    }).then(() => {
                        window.location.href = 'dashboard.html';
                    });
                } else {
                    console.warn("Login Gagal");
                    loginError.style.display = 'block';
                }
            })
            .catch(err => {
                console.error("Error login:", err);
                loginError.style.display = 'block';
                loginError.innerText = "Terjadi kesalahan pada server.";
            });
        });
    </script>
</body>

</html>
